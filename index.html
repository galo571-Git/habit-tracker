<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d13;
      --surface:      #16161f;
      --surface-h:    #1e1e2a;
      --border:       #252535;
      --border-focus: #6d5dfc;
      --text:         #e2e2f0;
      --muted:        #52526e;
      --accent:       #6d5dfc;
      --accent-glow:  rgba(109,93,252,.25);
      --success:      #34d399;
      --danger:       #f87171;
      --streak:       #f59e0b;
      --streak-bg:    rgba(245,158,11,.12);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(130deg, #a78bfa 0%, #6d5dfc 45%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: .35rem;
      font-size: .8125rem;
      color: var(--muted);
      letter-spacing: .01em;
    }

    .today-label {
      display: inline-block;
      margin-top: .75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .3rem .9rem;
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── Add form ── */
    .add-form {
      display: flex;
      gap: .625rem;
      margin-bottom: 1.75rem;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: .9375rem;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .add-form input::placeholder { color: var(--muted); }

    .add-form input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      padding: 0 1.125rem;
      transition: background .2s, transform .12s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(109,93,252,.4);
    }

    .btn-add:hover { background: #5a4de0; box-shadow: 0 4px 20px rgba(109,93,252,.55); }
    .btn-add:active { transform: scale(.94); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.75rem; margin-bottom: .75rem; }
    .empty p { font-size: .875rem; line-height: 1.6; }

    /* ── Habit list ── */
    .habits-list {
      display: flex;
      flex-direction: column;
      gap: .625rem;
    }

    /* ── Habit card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: .875rem;
      padding: .9rem 1.1rem;
      transition: border-color .2s, background .2s, transform .15s;
    }

    .card:hover { background: var(--surface-h); }

    .card.done {
      border-color: rgba(52,211,153,.2);
    }

    /* ── Check button ── */
    .check-btn {
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .875rem;
      color: transparent;
      transition: border-color .2s, background .2s, color .2s, transform .15s;
    }

    .check-btn:hover {
      border-color: var(--success);
      color: var(--success);
    }

    .card.done .check-btn {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.22); }
      70%  { transform: scale(.92); }
      100% { transform: scale(1); }
    }

    .check-btn.pop { animation: pop .28s ease; }

    /* ── Habit info ── */
    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-size: .9375rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .2s;
    }

    .card.done .habit-name {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: rgba(82,82,110,.6);
    }

    .habit-sub {
      font-size: .7188rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    /* ── Streak badge ── */
    .streak {
      display: flex;
      align-items: center;
      gap: .28rem;
      padding: .25rem .6rem;
      border-radius: 8px;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
      background: var(--streak-bg);
      color: var(--streak);
      transition: opacity .2s;
    }

    .streak.zero {
      background: transparent;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Delete button ── */
    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .35rem .4rem;
      border-radius: 8px;
      font-size: .8rem;
      line-height: 1;
      transition: color .2s, background .2s;
    }

    .del-btn:hover {
      color: var(--danger);
      background: rgba(248,113,113,.1);
    }

    /* ── Progress bar at top ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.25rem;
    }

    .progress-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--surface);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6d5dfc, #34d399);
      border-radius: 999px;
      transition: width .4s ease;
    }

    .progress-label {
      font-size: .75rem;
      color: var(--muted);
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">&#9670; Habits</div>
    <p class="tagline">Small steps. Big change.</p>
    <span class="today-label" id="today-label"></span>
  </header>

  <form class="add-form" id="add-form">
    <input id="habit-input" type="text" placeholder="New habit — e.g. Read 10 pages" maxlength="60" autocomplete="off">
    <button type="submit" class="btn-add" title="Add habit">+</button>
  </form>

  <div id="progress-row" class="progress-row" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <span class="progress-label" id="progress-label"></span>
  </div>

  <div id="list-root"></div>

</div>

<script>
  const KEY = 'ht-v1';

  /* ── Storage ── */
  const load  = () => { try { return JSON.parse(localStorage.getItem(KEY)) || {habits:[]}; } catch { return {habits:[]}; } };
  const store = d => localStorage.setItem(KEY, JSON.stringify(d));

  /* ── Dates ── */
  const today = () => new Date().toISOString().slice(0,10);

  function fmtDate(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    return new Date(y, m-1, d).toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric'});
  }

  /* ── Streak ── */
  function streak(completions) {
    if (!completions.length) return 0;
    const s   = new Set(completions);
    const now = today();
    const prev = offsetDate(now, -1);
    let cur = s.has(now) ? now : s.has(prev) ? prev : null;
    if (!cur) return 0;
    let count = 0;
    while (s.has(cur)) { count++; cur = offsetDate(cur, -1); }
    return count;
  }

  function offsetDate(iso, days) {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0,10);
  }

  /* ── Helpers ── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  /* ── Render ── */
  function render() {
    const data = load();
    const t    = today();

    // Header date
    document.getElementById('today-label').textContent = fmtDate(t);

    const root   = document.getElementById('list-root');
    const progRow = document.getElementById('progress-row');

    if (!data.habits.length) {
      progRow.style.display = 'none';
      root.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🌱</div>
          <p>No habits tracked yet.<br>Add your first one above to get started.</p>
        </div>`;
      return;
    }

    // Progress
    const done  = data.habits.filter(h => h.completions.includes(t)).length;
    const total = data.habits.length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    progRow.style.display = '';
    document.getElementById('progress-fill').style.width  = pct + '%';
    document.getElementById('progress-label').textContent = `${done}/${total} today`;

    // Cards
    root.innerHTML = `<div class="habits-list">${
      data.habits.map(h => {
        const isDone = h.completions.includes(t);
        const s      = streak(h.completions);
        const total  = h.completions.length;
        return `
          <div class="card${isDone ? ' done' : ''}" data-id="${h.id}">
            <button class="check-btn" onclick="toggle('${h.id}')" title="${isDone ? 'Uncheck' : 'Check off'}">
              ${isDone ? '✓' : ''}
            </button>
            <div class="habit-info">
              <div class="habit-name">${esc(h.name)}</div>
              <div class="habit-sub">${isDone ? '&#10003; Done today' : 'Not done yet'} &middot; ${total} total</div>
            </div>
            <div class="streak${s === 0 ? ' zero' : ''}">
              ${s > 0 ? '🔥' : '–'}&thinsp;${s > 0 ? s + (s === 1 ? ' day' : ' days') : 'No streak'}
            </div>
            <button class="del-btn" onclick="del('${h.id}')" title="Delete">&#10005;</button>
          </div>`;
      }).join('')
    }</div>`;
  }

  /* ── Actions ── */
  window.toggle = id => {
    const data = load();
    const h    = data.habits.find(h => h.id === id);
    if (!h) return;
    const t   = today();
    const idx = h.completions.indexOf(t);
    idx === -1 ? h.completions.push(t) : h.completions.splice(idx, 1);
    store(data);
    render();
    // bounce animation
    const btn = document.querySelector(`[data-id="${id}"] .check-btn`);
    if (btn) { btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); }
  };

  window.del = id => {
    const data = load();
    data.habits = data.habits.filter(h => h.id !== id);
    store(data);
    render();
  };

  document.getElementById('add-form').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('habit-input');
    const name  = input.value.trim();
    if (!name) return;
    const data = load();
    data.habits.push({ id: uid(), name, completions: [] });
    store(data);
    input.value = '';
    render();
    // scroll new card into view
    requestAnimationFrame(() => {
      const cards = document.querySelectorAll('.card');
      cards[cards.length - 1]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  render();
</script>
</body>
</html>
